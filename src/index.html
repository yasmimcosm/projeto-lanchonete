<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>SnackGo</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Open+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&icon_names=search" />
</head>
<body>

  <!-- HEADER -->
  <header>
    <nav class="header__nav">
      <h1>🍔 SnackGo</h1>
            <ul class="header__menu">
                <li><a class="header__link" href="#">Home</a></li>
                <li><a class="header__link" href="#best-sellers">Cardápio</a></li>
                <li><a class="header__link" href="#contact">Contato</a></li>
            </ul>
    </nav>
    <nav class="login">
      <ul class="header__search">
        <li><a href="/cadastro" class="cadastro__link">criar conta</a></li>
        <li><a href="/login" class="login__link">Entrar</a></li>
      </ul>
    </nav>

  </header>

  <!-- BANNER -->
  <section class="banner">
    <h2>A fome bateu? A gente resolve</h2>
    <p>Rápido, prático e do jeito que você gosta.</p>
    <div class="search">
      <span class="material-symbols-outlined">search</span>
      <input type="text" class="barra-search" placeholder="Buscar restaurante...">
      <button class="button__search">Buscar</button>
    </div>
  </section>

  <!-- LISTA DE RESTAURANTES -->
  <section class="restaurantes">

    <div class="card">
      <img src="img/pizza_banner.png" alt="Restaurante">
      <h3>Pizza Top 🍕</h3>
      <p>Pizzas e massas</p>
      <button class="button__card">Ver Cardápio</button>
    </div>

    <div class="card">
      <img src="img/burger_banner.png" alt="Restaurante">
      <h3>Burguer House 🍔</h3>
      <p>Hambúrguer artesanal</p>
      <button class="button__card">Ver Cardápio</button>
    </div>

    <div class="card">
      <img src="img/sushi_banner.png" alt="Restaurante">
      <h3>Sushi Prime 🍣</h3>
      <p>Comida japonesa</p>
      <button class="button__card">Ver Cardápio</button>
    </div>

    <div class="card">
      <img src="img/drinks_banner.png" alt="Restaurante">
      <h3>Drink House 🍹</h3>
      <p>Bebidas e drinks especiais</p>
      <button class="button__card">Ver Cardápio</button>
    </div>

  </section>

</body>
</html>
